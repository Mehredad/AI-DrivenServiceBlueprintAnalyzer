name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install aiosqlite
      - name: Run pytest
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test_blueprint.db"
          SECRET_KEY: "ci-test-secret-key-not-for-production-64chars-padded-xx"
          ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_SERVICE_KEY: "test-service-key"
          ALLOWED_ORIGINS: "http://localhost:3000"
          ENVIRONMENT: "test"
        run: pytest tests/ -v --tb=short

  migrate:
    name: Run migrations
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Alembic migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: cd api && alembic upgrade head
        continue-on-error: true

  deploy:
    name: Deploy to Vercel
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Inject Supabase public config into frontend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          sed -i "s|'%%SUPABASE_URL%%'|'${SUPABASE_URL}'|g" frontend/index.html
          sed -i "s|'%%SUPABASE_ANON_KEY%%'|'${SUPABASE_ANON_KEY}'|g" frontend/index.html
          echo "Supabase config injected"
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./
